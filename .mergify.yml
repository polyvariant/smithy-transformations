pull_request_rules:
- name: merge scala-steward's PRs
  conditions:
  - author=scala-steward
  - or:
    - body~=labels:.*early-semver-patch
    - body~=labels:.*early-semver-minor
  - status-success=Test (ubuntu-22.04, 3, temurin@17)
  actions:
    merge: {}
- name: Label smithy4sExample PRs
  conditions:
  - files~=^smithy4sExample/
  actions:
    label:
      add:
      - smithy4sExample
      remove: []
- name: Label tests PRs
  conditions:
  - files~=^tests/
  actions:
    label:
      add:
      - tests
      remove: []
- name: Label transformation PRs
  conditions:
  - files~=^transformation/
  actions:
    label:
      add:
      - transformation
      remove: []
